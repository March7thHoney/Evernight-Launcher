name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS Application
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | head -n 1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Selected Xcode path: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Build Intel (x86_64)
        run: |
          xcodebuild archive \
            -project Kafka-Launcher.xcodeproj \
            -scheme "Kafka-Launcher" \
            -configuration Release \
            -archivePath build/Kafka-Launcher-x86_64.xcarchive \
            -destination "generic/platform=macOS" \
            ARCHS="x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Build Apple Silicon (arm64)
        run: |
          xcodebuild archive \
            -project Kafka-Launcher.xcodeproj \
            -scheme "Kafka-Launcher" \
            -configuration Release \
            -archivePath build/Kafka-Launcher-arm64.xcarchive \
            -destination "generic/platform=macOS" \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Build Universal (x86_64 + arm64)
        run: |
          xcodebuild archive \
            -project Kafka-Launcher.xcodeproj \
            -scheme "Kafka-Launcher" \
            -configuration Release \
            -archivePath build/Kafka-Launcher-Universal.xcarchive \
            -destination "generic/platform=macOS" \
            ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Package Applications
        run: |
          # Package each built app using macOS ditto command to preserve permissions and symlinks
          ditto -c -k --sequesterRsrc --keepParent \
            build/Kafka-Launcher-x86_64.xcarchive/Products/Applications/Kafka-Launcher.app \
            Kafka-Launcher-Intel-x86_64.zip
            
          ditto -c -k --sequesterRsrc --keepParent \
            build/Kafka-Launcher-arm64.xcarchive/Products/Applications/Kafka-Launcher.app \
            Kafka-Launcher-AppleSilicon-arm64.zip
            
          ditto -c -k --sequesterRsrc --keepParent \
            build/Kafka-Launcher-Universal.xcarchive/Products/Applications/Kafka-Launcher.app \
            Kafka-Launcher-Universal.zip

      - name: Upload Build Artifacts (Actions Run)
        uses: actions/upload-artifact@v4
        with:
          name: Kafka-Launcher-Builds
          path: |
            Kafka-Launcher-Intel-x86_64.zip
            Kafka-Launcher-AppleSilicon-arm64.zip
            Kafka-Launcher-Universal.zip

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Kafka-Launcher-Intel-x86_64.zip
            Kafka-Launcher-AppleSilicon-arm64.zip
            Kafka-Launcher-Universal.zip
          draft: false
          prerelease: false
          generate_release_notes: true
