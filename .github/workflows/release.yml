name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for manual release (e.g. v1.0.0). Leave empty to run without creating a release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build macOS Application
    runs-on: macos-26

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract and Set Version
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION=$(echo "$TAG_NAME" | sed 's/^[vV]//')
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ] || [ "$VERSION" = "master" ]; then
            VERSION="1.0.0"
          fi
          echo "Setting version to: $VERSION"
          sed -i '' "s/MARKETING_VERSION = [0-9.]*;/MARKETING_VERSION = $VERSION;/g" Kafka-Launcher.xcodeproj/project.pbxproj

      - name: Select Xcode Version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -n 1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Selected Xcode path: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Build Intel (x86_64)
        run: |
          rm -rf "$RUNNER_TEMP/kafka-launcher-build"
          mkdir -p "$RUNNER_TEMP/kafka-launcher-build"
          xcodebuild archive \
            -project Kafka-Launcher.xcodeproj \
            -scheme "Kafka-Launcher" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/kafka-launcher-build/Kafka-Launcher-x86_64.xcarchive" \
            -destination "generic/platform=macOS" \
            ARCHS="x86_64" \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Build Apple Silicon (arm64)
        run: |
          xcodebuild archive \
            -project Kafka-Launcher.xcodeproj \
            -scheme "Kafka-Launcher" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/kafka-launcher-build/Kafka-Launcher-arm64.xcarchive" \
            -destination "generic/platform=macOS" \
            ARCHS="arm64" \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Build Universal (x86_64 + arm64)
        run: |
          xcodebuild archive \
            -project Kafka-Launcher.xcodeproj \
            -scheme "Kafka-Launcher" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/kafka-launcher-build/Kafka-Launcher-Universal.xcarchive" \
            -destination "generic/platform=macOS" \
            ARCHS="x86_64 arm64" \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Package Applications
        run: |
          # Package each built app using macOS ditto command to preserve permissions and symlinks
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/kafka-launcher-build/Kafka-Launcher-x86_64.xcarchive/Products/Applications/Evernight Launcher.app" \
            Evernight-Launcher-Intel-x86_64.zip
            
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/kafka-launcher-build/Kafka-Launcher-arm64.xcarchive/Products/Applications/Evernight Launcher.app" \
            Evernight-Launcher-AppleSilicon-arm64.zip
            
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/kafka-launcher-build/Kafka-Launcher-Universal.xcarchive/Products/Applications/Evernight Launcher.app" \
            Evernight-Launcher-Universal.zip

      - name: Upload Build Artifacts (Actions Run)
        uses: actions/upload-artifact@v4
        with:
          name: Evernight-Launcher-Builds
          path: |
            Evernight-Launcher-Intel-x86_64.zip
            Evernight-Launcher-AppleSilicon-arm64.zip
            Evernight-Launcher-Universal.zip

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '')
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            Evernight-Launcher-Intel-x86_64.zip
            Evernight-Launcher-AppleSilicon-arm64.zip
            Evernight-Launcher-Universal.zip
          draft: false
          prerelease: false
          generate_release_notes: true
